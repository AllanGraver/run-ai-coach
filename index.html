<main class="container">
  <!-- Header row -->
  <section class="row row--top">
    <header class="page-head">
      <h1>Dashboard</h1>
      <div class="range-tabs" role="tablist">
        <button class="tab is-active" data-range="7d">7d</button>
        <button class="tab" data-range="14d">14d</button>
        <button class="tab" data-range="28d">28d</button>
        <button class="tab" data-range="12w">12 uger</button>
        <button class="tab" data-range="6m">6 mdr</button>
      </div>
    </header>
  </section>

  <!-- Grid -->
  <section class="grid">
    <!-- Big Status -->
    <article class="card card--wide" id="cardStatus">
      <div class="card__head">
        <h2>Status</h2>
        <span class="badge" data-status="green" id="statusBadge">Stabil</span>
      </div>
      <p class="big" id="statusHeadline">✅ Stabil og svagt stigende</p>
      <ul class="bullets" id="statusBullets"></ul>
    </article>

    <!-- KPIs -->
    <article class="card kpi">
      <div class="kpi__label">Distance</div>
      <div class="kpi__value" id="kpiDistance">—</div>
      <div class="kpi__delta" id="kpiDistanceDelta">—</div>
    </article>

    <article class="card kpi">
      <div class="kpi__label">Træningspas</div>
      <div class="kpi__value" id="kpiRuns">—</div>
      <div class="kpi__delta" id="kpiRunsDelta">—</div>
    </article>

    <article class="card kpi">
      <div class="kpi__label">Gns. tempo</div>
      <div class="kpi__value" id="kpiPace">—</div>
      <div class="kpi__delta muted" id="kpiPaceHint">—</div>
    </article>

    <!-- Trend -->
    <article class="card card--wide" id="cardTrend">
      <div class="card__head">
        <h2>Trend</h2>
        <div class="segmented">
          <button class="seg is-active" data-metric="distance">Distance</button>
          <button class="seg" data-metric="load">Load</button>
          <button class="seg" data-metric="runs">Pas</button>
        </div>
      </div>
      <div class="chart" id="trendChart"></div>
      <p class="muted" id="trendCaption"></p>
    </article>

    <!-- AI Insights -->
    <article class="card" id="cardAI">
      <div class="card__head">
        <h2>🧠 Indsigt</h2>
      </div>
      <p class="big" id="aiHeadline">—</p>
      <ul class="bullets" id="aiBullets"></ul>
    </article>

    <!-- Recent activities -->
    <article class="card" id="cardRecent">
      <div class="card__head">
        <h2>Seneste ture</h2>
        #activitiesSe alle</a>
      </div>
      <ul class="activity-list" id="recentList"></ul>
    </article>

    <!-- Details (collapsed) -->
    <article class="card card--wide" id="cardDetails">
      <details>
        <summary>Vis detaljer</summary>
        <div class="details-grid">
          <div class="mini">
            <h3>Recovery</h3>
            <div id="recoveryWidget">—</div>
          </div>
          <div class="mini">
            <h3>Advarsler</h3>
            <ul id="flagsList"></ul>
          </div>
        </div>
      </details>
    </article>
  </section>
</main>
