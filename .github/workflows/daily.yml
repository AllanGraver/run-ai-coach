name: Daily test run

on:
  schedule:
    # Kører hver dag kl. 05:15 UTC (≈ 06:15 DK vintertid, 07:15 DK sommertid)
    - cron: '15 5 * * *'
  workflow_dispatch:  # gør at du kan starte den manuelt fra Actions

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      
      - name: Verify secrets are present
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          set -e
          if [ -z "$STRAVA_CLIENT_ID" ]; then echo "❌ Missing STRAVA_CLIENT_ID"; exit 1; fi
          if [ -z "$STRAVA_CLIENT_SECRET" ]; then echo "❌ Missing STRAVA_CLIENT_SECRET"; exit 1; fi
          if [ -z "$STRAVA_REFRESH_TOKEN" ]; then echo "❌ Missing STRAVA_REFRESH_TOKEN"; exit 1; fi
          echo "✅ All required secrets are present (values not shown)."

      - name: Strava connection health-check
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python strava_healthcheck.py 
      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install requests

      - name: Run Strava fetch script
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python script.py
